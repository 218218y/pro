name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      # Opt JavaScript actions into the newer GitHub Actions runtime now, before
      # Node.js 24 becomes the platform default.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          # Keep CI on the current stable runtime line supported by the project
          # engines range (>=22.12), while avoiding Node 20 deprecation noise.
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Verify CI suite
        run: npm run verify -- --ci

      - name: Audit high severity dependencies
        run: npm audit --audit-level=high
