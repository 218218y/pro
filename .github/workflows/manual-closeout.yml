name: Manual Closeout Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  closeout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Run closeout verify core
        run: node tools/wp_verify_closeout.cjs --profile verify-core --write --log-dir .artifacts/closeout-logs
